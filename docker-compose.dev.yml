services:
  app:
    image: golang:latest
    container_name: bookit-app-dev
    working_dir: /app
    volumes:
      - ./app:/app
      - go-mod-cache:/go/pkg/mod
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      postgres_db:
        condition: service_healthy
    command: >
      sh -c "
      go install github.com/swaggo/swag/cmd/swag@latest &&
      go install github.com/air-verse/air@latest &&
      air
      "

volumes:
  go-mod-cache:
