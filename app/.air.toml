root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ."
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "test", "docs"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go"]
  kill_delay = 500
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
