      consumes:
      - multipart/form-data
      description: Creates a new category
      parameters:
      - description: Name KZ
        in: formData
        name: name_kz
        required: true
        type: string
      - description: Name RU
        in: formData
        name: name_ru
        required: true
        type: string
      - description: Name EN
        in: formData
        name: name_en
        required: true
        type: string
      - description: Is active
        in: formData
        name: is_active
        type: boolean
      - description: Category icon
        in: formData
        name: icon
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/schemas.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
